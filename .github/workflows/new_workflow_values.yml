name: passing job values

on:
  workflow_dispatch:

jobs:
  pass_in_one_job:
    runs-on: ubuntu-latest
    steps:
      - name: Set color
        id: color-selector
        run: echo "COLOR=green" >> "$GITHUB_ENV"
      - name: Get color
        run: echo "The selected color is $COLOR"

  producer:
    runs-on: ubuntu-latest
    outputs:
      sentence: ${{ steps.sentence_maker.outputs.sentence }}
    steps:
      - name: Make a sentence
        id: sentence_maker
        run: |
          echo "sentence=Hello from the producer job" >> "$GITHUB_OUTPUT"

  consumer:
    runs-on: ubuntu-latest
    needs: producer
    steps:
      - name: Print the message
        env:
          message: ${{ needs.producer.outputs.sentence }}
        run: |
          echo $message

  job_1:
    name: Add 3 and 7
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: |
          expr 3 + 7 > result.txt
      - uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.txt

  job_2:
    name: Multiply by 9
    needs: job_1
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: result
      - shell: bash
        run: |
          value=`cat result.txt`
          echo $(expr $value \* 9)
